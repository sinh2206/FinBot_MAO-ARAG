services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vn-stock-mao-arag:latest
    container_name: vn-stock-mao-arag-app
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      HF_HOME: /app/.cache/huggingface
      TOKENIZERS_PARALLELISM: "false"
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    command: ["python", "-m", "backend.main"]
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - huggingface-cache:/app/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # Nếu host có NVIDIA Container Toolkit và bạn muốn chạy model local bằng GPU,
    # bỏ comment phần dưới:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  runner:
    build:
      context: .
      dockerfile: Dockerfile
    image: vn-stock-mao-arag:latest
    container_name: vn-stock-mao-arag-runner
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      HF_HOME: /app/.cache/huggingface
      TOKENIZERS_PARALLELISM: "false"
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    command: ["bash", "-lc", "sleep infinity"]
    stdin_open: true
    tty: true
    volumes:
      - ./:/app
      - huggingface-cache:/app/.cache/huggingface
    restart: unless-stopped
    # Nếu host có NVIDIA Container Toolkit và bạn muốn chạy model local bằng GPU,
    # bỏ comment phần dưới:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  frontend:
    image: python:3.11-slim-bookworm
    container_name: vn-stock-mao-arag-frontend
    working_dir: /app
    command: ["python", "-m", "http.server", "8080", "-d", "frontend"]
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app/frontend:ro
    depends_on:
      - app
    restart: unless-stopped
    profiles: ["frontend"]

volumes:
  huggingface-cache:
