planner:
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  quantize: "4bit"
  max_new_tokens: 512
  temperature: 0.1
  local_files_only: true

executor:
  model_name: "LiquidAI/LFM2-1.2B-RAG"
  quantize: "4bit"
  max_new_tokens: 128
  temperature: 0.0
  local_files_only: true

retriever:
  top_k: 10
  dense_top_k: 50
  sparse_top_k: 50
  retrieval_mode: "hybrid"
  hybrid_weight: 0.7
  raw_data_dir: "data/raw_data"
  documents_dir: "data/processed_data"
  chunks_file: "data/chunks/chunks.json"
  index_dir: "data/index"

reranker:
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5
  batch_size: 16

aggregator:
  mode: "template"
  use_executor_for_synthesis: false
