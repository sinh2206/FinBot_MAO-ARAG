planner:
  provider: "local"
  model_name: "models/phi"
  repo_id: "microsoft/Phi-4-mini-instruct"
  max_new_tokens: 256
  temperature: 0.1
  local_files_only: true

executor:
  primary:
    provider: "local"
    model_name: "models/qwen"
    repo_id: "Qwen/Qwen2.5-7B-Instruct"
    quantize: "4bit"
    max_new_tokens: 256
    temperature: 0.0
    local_files_only: true
  fallback:
    provider: "gemini"
    model_name: "gemini-2.5-flash"
    api_key_env: "GEMINI_API_KEY"
    max_new_tokens: 256
    temperature: 0.0
    trigger: "qwen_empty_or_not_found"

retriever:
  top_k: 10
  dense_top_k: 50
  sparse_top_k: 50
  retrieval_mode: "hybrid"
  hybrid_weight: 0.7
  raw_data_dir: "data/raw_data"
  documents_dir: "data/processed_data"
  chunks_file: "data/chunks/chunks.json"
  index_dir: "data/index"

reranker:
  model_name: "models/cross_encoder"
  top_k: 5
  batch_size: 16

aggregator:
  mode: "template"
  use_executor_for_synthesis: true
  executor_fallback_policy: "qwen_then_gemini"
