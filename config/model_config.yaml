models:
  planner:
    provider: "local"
    repo_id: "microsoft/Phi-4-mini-instruct"
    local_dir: "models/phi"
    quantize: "4bit"
    device_map: "auto"
    local_files_only: true

  executor_primary:
    provider: "local"
    repo_id: "Qwen/Qwen2.5-7B-Instruct"
    local_dir: "models/qwen"
    quantize: "4bit"
    device_map: "auto"
    local_files_only: true

  executor_fallback:
    provider: "gemini"
    model_name: "gemini-2.5-flash"
    api_key_env: "GEMINI_API_KEY"
    temperature: 0.0
    max_output_tokens: 256

  embedder:
    repo_id: "sentence-transformers/all-MiniLM-L6-v2"
    local_dir: "models/embedder"
    dimension: 384
    local_files_only: true

  cross_encoder:
    repo_id: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    local_dir: "models/cross_encoder"
    local_files_only: true
