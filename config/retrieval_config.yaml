retrieval:
  mode: "hybrid"
  top_k: 10
  executor_top_k: 5
  dense_top_k: 50
  sparse_top_k: 50
  dense_weight: 0.7
  sparse_weight: 0.3

chunking:
  chunk_size: 384
  chunk_overlap_ratio: 0.2
  separators:
    - "\n\n"
    - "\n"
    - ". "
    - "? "
    - "! "
    - " "

preprocessing:
  raw_data_dir: "data/raw_data"
  processed_data_dir: "data/processed_data"
  recursive: true
  overwrite: false
  supported_extensions:
    - ".pdf"
    - ".docx"
    - ".doc"
    - ".txt"
    - ".md"
    - ".markdown"
    - ".html"
    - ".htm"
    - ".csv"
  ocr:
    mode: "auto"
    language: "vie+eng"
    dpi: 150
    min_extracted_chars: 200

paths:
  raw_data_dir: "data/raw_data"
  processed_data_dir: "data/processed_data"
  documents_dir: "data/processed_data"
  chunks_dir: "data/chunks"
  index_dir: "data/index"
  embeddings_dir: "data/embeddings"
  metadata_dir: "data/metadata"
